<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Clo · Transcription audio ✿</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf4f1;
    --bg-2: #fbe7e0;
    --panel: #ffffff;
    --panel-2: #fdf0eb;
    --border: #f3d4c8;
    --border-soft: #fae5dc;
    --text: #4a2c3a;
    --text-soft: #7a5266;
    --muted: #b08a99;
    --accent: #ec4899;        /* rose vif */
    --accent-strong: #db2777; /* rose magenta */
    --accent-soft: #fbcfe8;   /* rose pastel */
    --gold: #d4a574;          /* champagne */
    --mint: #b8e0d2;          /* touche menthe */
    --danger: #e85a4f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    font-size: 14px; line-height: 1.55;
    min-height: 100vh;
    display: flex; flex-direction: column;
    background:
      radial-gradient(circle at 0% 0%, #fde2dd 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #f8d7e3 0%, transparent 50%),
      radial-gradient(circle at 80% 10%, #fce4d6 0%, transparent 40%),
      var(--bg);
    background-attachment: fixed;
  }

  header {
    padding: 22px 32px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: baseline; gap: 14px;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    margin: 0;
    font-family: "Fraunces", Georgia, serif;
    font-size: 28px; font-weight: 700;
    background: linear-gradient(120deg, var(--accent-strong), var(--accent), var(--gold));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  header .sub {
    color: var(--text-soft); font-size: 13px;
    font-family: "Fraunces", Georgia, serif; font-style: italic; font-weight: 400;
  }
  header .heart { color: var(--accent); font-size: 14px; }

  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 0; flex: 1; }
  .left, .right { padding: 28px; }
  .left {
    border-right: 1px solid var(--border-soft);
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(6px);
  }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    .left { border-right: none; border-bottom: 1px solid var(--border-soft); }
  }

  /* Scrollbars douces */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--accent-soft); border-radius: 8px;
    border: 2px solid transparent; background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); background-clip: padding-box; border: 2px solid transparent; }

  .field { margin-bottom: 20px; }
  label {
    display: block; font-size: 11px;
    color: var(--text-soft); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
  }
  input[type="text"], select {
    width: 100%; padding: 11px 14px;
    background: #ffffff; color: var(--text);
    border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 14px; font-family: inherit;
    outline: none; transition: all 0.2s;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.12);
  }

  .file-drop {
    border: 2px dashed var(--accent-soft); border-radius: 16px; padding: 26px 16px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: linear-gradient(135deg, #ffffff 0%, var(--panel-2) 100%);
  }
  .file-drop:hover, .file-drop.dragover {
    border-color: var(--accent); background: #fff6f9;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px -10px rgba(236, 72, 153, 0.35);
  }
  .file-drop .filename {
    font-weight: 600; color: var(--accent-strong); margin-top: 8px;
    font-size: 14px;
  }
  .file-drop .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }
  input[type="file"] { display: none; }

  .toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; color: var(--text); font-weight: 500; }
  .toggle input { accent-color: var(--accent); width: 17px; height: 17px; cursor: pointer; }

  .go-btn {
    width: 100%; padding: 18px; margin-top: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: #ffffff;
    border: none; border-radius: 16px;
    font-size: 17px; font-weight: 700;
    font-family: "Fraunces", Georgia, serif;
    letter-spacing: 1.5px; cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 10px 24px -8px rgba(236, 72, 153, 0.5);
  }
  .go-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px -8px rgba(236, 72, 153, 0.6);
  }
  .go-btn:active { transform: translateY(0); }
  .go-btn:disabled {
    background: #f0e0e8; color: var(--muted);
    cursor: not-allowed; transform: none; box-shadow: none;
  }

  .right-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .right-header h2 {
    margin: 0; font-family: "Fraunces", Georgia, serif;
    font-size: 22px; font-weight: 600; color: var(--text);
    font-style: italic;
  }
  .right-header h2::before { content: "✿ "; color: var(--accent); font-style: normal; }

  .status-box {
    display: none;
    align-items: center; gap: 18px;
    background: linear-gradient(135deg, #fff5f9 0%, #fde7f0 100%);
    border: 1.5px solid var(--accent-soft);
    border-radius: 18px;
    padding: 18px 22px;
    margin-bottom: 14px;
    box-shadow: 0 8px 28px -12px rgba(236, 72, 153, 0.3);
  }
  .status-box.show { display: flex; }
  .status-box.idle {
    background: linear-gradient(135deg, #fff 0%, #fdf2ec 100%);
    border-color: var(--border);
    box-shadow: 0 4px 14px -8px rgba(184, 224, 210, 0.4);
  }
  .status-box.idle .spinner { display: none; }
  .spinner {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border: 3px solid var(--accent-soft);
    border-top-color: var(--accent-strong);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-content { flex: 1; min-width: 0; }
  .status-text { font-size: 15px; font-weight: 600; color: var(--text); }
  .status-meta { font-size: 12.5px; color: var(--text-soft); margin-top: 3px; }
  .status-percent {
    font-family: "Fraunces", Georgia, serif;
    font-size: 26px; font-weight: 700; color: var(--accent-strong);
    font-variant-numeric: tabular-nums; min-width: 64px; text-align: right;
  }

  .progress-bar {
    height: 10px; background: #fff; border-radius: 6px;
    overflow: hidden; margin-bottom: 22px;
    border: 1px solid var(--border-soft);
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent-soft), var(--accent), var(--accent-strong));
    transition: width 0.4s ease;
    box-shadow: 0 0 14px rgba(236, 72, 153, 0.5);
    border-radius: 6px;
  }

  #transcript {
    background: #ffffff;
    border: 1px solid var(--border-soft);
    border-radius: 18px;
    padding: 24px 26px;
    height: 500px; overflow-y: auto;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 14.5px; line-height: 1.75;
    white-space: pre-wrap; word-wrap: break-word;
    color: var(--text);
    box-shadow: 0 4px 24px -16px rgba(192, 132, 152, 0.4);
  }
  #transcript:empty::before {
    content: "✨ La transcription apparaîtra ici…";
    color: var(--muted); font-style: italic;
  }
  #transcript .speaker-line {
    color: var(--accent-strong); font-weight: 700;
    margin-top: 18px; padding-bottom: 4px;
    font-family: "Fraunces", Georgia, serif;
    font-size: 15px; font-style: italic;
    border-bottom: 1px dashed var(--accent-soft);
    display: inline-block;
  }
  #transcript .speaker-line:first-child { margin-top: 0; }
  #transcript .text-line, #transcript .plain-line {
    color: var(--text);
    padding: 2px 0;
  }
  #transcript .text-line { margin-left: 4px; padding-left: 14px; border-left: 2px solid var(--accent-soft); }
  #transcript .seg-text { /* inline */ }
  #transcript .ts {
    color: var(--muted); font-size: 11px;
    font-variant-numeric: tabular-nums;
    background: var(--panel-2); padding: 1px 6px; border-radius: 4px;
    margin-right: 6px;
    cursor: pointer; transition: all 0.15s;
  }
  #transcript .ts:hover {
    background: var(--accent-soft); color: var(--accent-strong);
  }

  #transcript .seg-text {
    outline: none; border-radius: 4px;
    padding: 1px 3px; margin: -1px -3px;
    transition: background 0.15s;
  }
  #transcript .seg-text:hover { background: rgba(236, 72, 153, 0.06); }
  #transcript .seg-text:focus {
    background: #fff8fb;
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .audio-player-wrap {
    display: none;
    background: linear-gradient(135deg, #ffffff 0%, var(--panel-2) 100%);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 14px;
    align-items: center; gap: 12px;
    box-shadow: 0 4px 14px -10px rgba(192, 132, 152, 0.4);
  }
  .audio-player-wrap.show { display: flex; }
  .audio-player-wrap .label {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic; color: var(--text-soft);
    font-size: 13px; white-space: nowrap;
  }
  .audio-player-wrap audio { flex: 1; min-width: 0; height: 36px; }

  .edit-speaker-btn {
    display: inline-block; vertical-align: baseline;
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-size: 13px;
    padding: 0 6px; margin-left: 6px;
    border-radius: 6px; line-height: 1;
    opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s;
  }
  #transcript .text-line:hover .edit-speaker-btn,
  #transcript .plain-line:hover .edit-speaker-btn { opacity: 1; }
  .edit-speaker-btn:hover { color: var(--accent-strong); background: var(--accent-soft); }
  .edit-speaker-btn:focus { opacity: 1; outline: none; color: var(--accent-strong); }

  .edit-speaker-select {
    display: inline-block; vertical-align: baseline;
    width: auto; max-width: 180px;
    margin-left: 6px;
    font-family: inherit; font-size: 12px;
    padding: 2px 8px; border-radius: 8px;
    border: 1.5px solid var(--accent); background: white;
    color: var(--accent-strong); font-weight: 600;
    outline: none; cursor: pointer;
  }
  .edit-speaker-select:focus { box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.15); }

  .done-banner {
    margin-top: 20px; padding: 20px 24px;
    background: linear-gradient(135deg, #fce7f3 0%, #ffe4f0 50%, #fff0e6 100%);
    border: 1.5px solid var(--accent-soft);
    border-radius: 18px;
    font-family: "Fraunces", Georgia, serif;
    font-size: 18px; font-weight: 600; color: var(--accent-strong);
    text-align: center; display: none;
    box-shadow: 0 8px 28px -12px rgba(236, 72, 153, 0.3);
  }
  .done-banner.error {
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    border-color: var(--danger); color: var(--danger);
  }
  .done-banner.show { display: block; }

  .speakers-panel {
    margin-top: 20px; padding: 24px;
    background: #ffffff;
    border: 1px solid var(--border-soft); border-radius: 18px;
    display: none;
    box-shadow: 0 4px 24px -16px rgba(192, 132, 152, 0.4);
  }
  .speakers-panel.show { display: block; }
  .speakers-panel h3 {
    margin: 0 0 6px 0; font-family: "Fraunces", Georgia, serif;
    font-size: 18px; font-weight: 600; color: var(--text);
  }
  .speakers-panel h3::before { content: "♡ "; color: var(--accent); }
  .speakers-panel .hint { color: var(--text-soft); font-size: 13px; margin-bottom: 16px; }
  .speaker-row {
    display: grid; grid-template-columns: 110px 1fr 1fr; gap: 14px;
    align-items: center; margin-bottom: 12px;
    padding: 10px; border-radius: 12px;
    background: var(--panel-2);
  }
  .speaker-row .label {
    font-weight: 700; color: var(--accent-strong);
    font-family: "Fraunces", Georgia, serif; font-style: italic;
  }
  .speaker-row audio { width: 100%; height: 34px; }

  .download-row { margin-top: 20px; gap: 12px; flex-wrap: wrap; display: none; }
  .download-row.show { display: flex; }
  .download-btn {
    padding: 12px 22px; background: #ffffff; color: var(--text);
    border: 1.5px solid var(--border); border-radius: 14px; cursor: pointer;
    font-size: 13.5px; font-weight: 600; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.2s; font-family: inherit;
  }
  .download-btn:hover {
    border-color: var(--accent); color: var(--accent-strong);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px -8px rgba(236, 72, 153, 0.3);
  }
  .download-btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: #ffffff; border-color: transparent; font-weight: 700;
    box-shadow: 0 6px 18px -6px rgba(236, 72, 153, 0.5);
  }
  .download-btn.primary:hover {
    color: #ffffff;
    box-shadow: 0 10px 24px -6px rgba(236, 72, 153, 0.6);
  }

  .apply-btn {
    padding: 12px 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: #ffffff;
    border: none; border-radius: 14px; cursor: pointer; font-weight: 700;
    font-family: inherit; font-size: 14px;
    margin-top: 10px;
    box-shadow: 0 6px 18px -6px rgba(236, 72, 153, 0.5);
    transition: all 0.2s;
  }
  .apply-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -6px rgba(236, 72, 153, 0.6); }
  .apply-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<header>
  <h1>Clo</h1>
  <span class="sub">transcription audio</span>
</header>

<div class="layout">

  <aside class="left">
    <div class="field">
      <label>Fichier audio</label>
      <label class="file-drop" id="fileDrop">
        <div>✿ Choisir ou glisser un fichier</div>
        <div class="hint">mp3, wav, m4a, flac, ogg…</div>
        <div class="filename" id="filename"></div>
        <input type="file" id="fileInput" accept="audio/*,video/*" />
      </label>
    </div>

    <div class="field">
      <label>Langue</label>
      <select id="language">
        <option value="fr" selected>Français</option>
        <option value="en">Anglais</option>
        <option value="es">Espagnol</option>
        <option value="de">Allemand</option>
        <option value="it">Italien</option>
        <option value="pt">Portugais</option>
        <option value="auto">Auto-détection</option>
      </select>
    </div>

    <div class="field">
      <label>Modèle Whisper</label>
      <select id="model">
        <option value="tiny">tiny — très rapide, qualité faible</option>
        <option value="base">base — rapide</option>
        <option value="small" selected>small — équilibré (défaut)</option>
        <option value="medium">medium — qualité++</option>
        <option value="large-v3">large-v3 — meilleur, plus lent</option>
      </select>
    </div>

    <div class="field">
      <label class="toggle">
        <input type="checkbox" id="diarize" />
        <span>Identifier les locuteurs (diarisation)</span>
      </label>
    </div>

    <div class="field">
      <label class="toggle">
        <input type="checkbox" id="vad" checked />
        <span>Filtre VAD (sauter les silences)</span>
      </label>
    </div>

    <button id="goBtn" class="go-btn" disabled>✦ Lancer la transcription ✦</button>
  </aside>

  <main class="right">
    <div class="right-header">
      <h2>Transcription</h2>
    </div>

    <div id="statusBox" class="status-box">
      <div class="spinner"></div>
      <div class="status-content">
        <div class="status-text" id="statusText">En attente…</div>
        <div class="status-meta" id="statusMeta"></div>
      </div>
      <div class="status-percent" id="statusPercent">0%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="audio-player-wrap" id="audioWrap">
      <span class="label">♪ Audio</span>
      <audio id="audioPlayer" controls preload="metadata"></audio>
    </div>

    <div id="transcript"></div>

    <div id="doneBanner" class="done-banner"></div>

    <div id="speakersPanel" class="speakers-panel">
      <h3>Nommer les locuteurs (optionnel)</h3>
      <div class="hint">Écoute un échantillon de chaque voix et attribue un nom. Laisse vide pour garder « Speaker N ».</div>
      <div id="speakersList"></div>
      <button id="applyBtn" class="apply-btn">Appliquer les noms</button>
    </div>

    <div id="downloadRow" class="download-row">
      <a class="download-btn primary" id="dlDocx" href="#" download>♡ Word (.docx)</a>
      <a class="download-btn" id="dlMd" href="#" download>markdown</a>
      <a class="download-btn" id="dlZip" href="#" download>zip (txt + srt)</a>
      <a class="download-btn" id="dlTxt" href="#" download>texte</a>
      <a class="download-btn" id="dlSrt" href="#" download>sous-titres</a>
    </div>
  </main>

</div>

<script>
const els = {
  fileDrop: document.getElementById("fileDrop"),
  fileInput: document.getElementById("fileInput"),
  filename: document.getElementById("filename"),
  language: document.getElementById("language"),
  model: document.getElementById("model"),
  diarize: document.getElementById("diarize"),
  vad: document.getElementById("vad"),
  goBtn: document.getElementById("goBtn"),
  statusBox: document.getElementById("statusBox"),
  statusText: document.getElementById("statusText"),
  statusMeta: document.getElementById("statusMeta"),
  statusPercent: document.getElementById("statusPercent"),
  progressFill: document.getElementById("progressFill"),
  transcript: document.getElementById("transcript"),
  doneBanner: document.getElementById("doneBanner"),
  speakersPanel: document.getElementById("speakersPanel"),
  speakersList: document.getElementById("speakersList"),
  applyBtn: document.getElementById("applyBtn"),
  downloadRow: document.getElementById("downloadRow"),
  dlDocx: document.getElementById("dlDocx"),
  dlMd: document.getElementById("dlMd"),
  dlZip: document.getElementById("dlZip"),
  dlTxt: document.getElementById("dlTxt"),
  dlSrt: document.getElementById("dlSrt"),
  audioWrap: document.getElementById("audioWrap"),
  audioPlayer: document.getElementById("audioPlayer"),
};

let selectedFile = null;
let currentJobId = null;
let currentEventSource = null;
let currentSpeakerInLine = null;
let lastSegmentIndex = 0;
let wakeLock = null;
let jobInProgress = false;
let currentMeta = "";
let segments = [];          // tous les segments reçus (pour re-render après edit)
let currentSpeakers = [];   // [{label, sample_url, ...}]
let currentNameMap = {};    // mapping renommage : {"Speaker 1": "Marc"}
let isEditingText = false;  // pour suspendre l'auto-scroll pendant l'édition

function speakerDisplay(label) {
  if (!label) return null;
  return currentNameMap[label] || label;
}

function setAudioSource(jobId) {
  if (els.audioPlayer.dataset.jobId === jobId) return;
  els.audioPlayer.src = `/audio/${jobId}`;
  els.audioPlayer.dataset.jobId = jobId;
  els.audioWrap.classList.add("show");
}

function jumpToTimestamp(seconds) {
  if (!els.audioPlayer.src) return;
  els.audioPlayer.currentTime = seconds;
  els.audioPlayer.play().catch(() => {});
}

function setStatus(text, { idle = false, percent = null, meta = null } = {}) {
  els.statusBox.classList.add("show");
  els.statusBox.classList.toggle("idle", idle);
  els.statusText.textContent = text;
  if (meta !== null) { currentMeta = meta; els.statusMeta.textContent = meta; }
  if (percent !== null) {
    els.statusPercent.textContent = Math.round(percent) + "%";
    els.progressFill.style.width = percent + "%";
  }
}

function hideStatus() {
  els.statusBox.classList.remove("show");
  els.progressFill.style.width = "0%";
  currentMeta = "";
}

function fmtTime(t) {
  const ms = Math.round(t * 1000);
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

async function acquireWakeLock() {
  if (!("wakeLock" in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch (e) {
    console.warn("WakeLock indisponible :", e.message);
  }
}
async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch (e) {} wakeLock = null; }
}
document.addEventListener("visibilitychange", async () => {
  if (document.visibilityState === "visible" && jobInProgress && !wakeLock) {
    await acquireWakeLock();
  }
});

["dragenter","dragover"].forEach(ev => els.fileDrop.addEventListener(ev, e => {
  e.preventDefault(); els.fileDrop.classList.add("dragover");
}));
["dragleave","drop"].forEach(ev => els.fileDrop.addEventListener(ev, e => {
  e.preventDefault(); els.fileDrop.classList.remove("dragover");
}));
els.fileDrop.addEventListener("drop", e => {
  if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
});
els.fileInput.addEventListener("change", e => {
  if (e.target.files.length) setFile(e.target.files[0]);
});

function setFile(file) {
  selectedFile = file;
  els.filename.textContent = file.name;
  els.goBtn.disabled = false;
}

els.goBtn.addEventListener("click", async () => {
  if (!selectedFile) return;
  resetUI();
  els.goBtn.disabled = true;
  setStatus("Envoi du fichier…", { meta: selectedFile.name });

  const fd = new FormData();
  fd.append("file", selectedFile);
  let res;
  try {
    res = await fetch("/upload", { method: "POST", body: fd });
  } catch (e) { showError("Erreur upload : " + e.message); els.goBtn.disabled = false; return; }
  if (!res.ok) { showError("Erreur upload : " + res.statusText); els.goBtn.disabled = false; return; }
  const { job_id } = await res.json();
  currentJobId = job_id;
  localStorage.setItem("lastJobId", job_id);

  setStatus("Démarrage du job…", { meta: selectedFile.name });

  const params = new URLSearchParams({
    model: els.model.value,
    language: els.language.value,
    diarize: els.diarize.checked,
    vad: els.vad.checked,
  });
  try {
    const startRes = await fetch(`/start/${job_id}?${params}`, { method: "POST" });
    if (!startRes.ok) throw new Error(startRes.statusText);
  } catch (e) { showError("Erreur démarrage : " + e.message); els.goBtn.disabled = false; return; }

  jobInProgress = true;
  setAudioSource(job_id);
  await acquireWakeLock();
  subscribe(job_id);
});

function subscribe(jobId) {
  if (currentEventSource) currentEventSource.close();
  currentEventSource = new EventSource(`/events/${jobId}`);
  currentEventSource.onmessage = (e) => handleEvent(JSON.parse(e.data));
  currentEventSource.onerror = () => {
    if (currentEventSource.readyState === EventSource.CONNECTING) {
      setStatus("Reconnexion…", { meta: currentMeta });
    }
  };
}

function resetUI() {
  hideStatus();
  els.transcript.innerHTML = "";
  els.doneBanner.className = "done-banner";
  els.doneBanner.textContent = "";
  els.speakersPanel.classList.remove("show");
  els.speakersList.innerHTML = "";
  els.downloadRow.classList.remove("show");
  els.audioWrap.classList.remove("show");
  els.audioPlayer.removeAttribute("src");
  els.audioPlayer.dataset.jobId = "";
  currentSpeakerInLine = null;
  lastSegmentIndex = 0;
  segments = [];
  currentSpeakers = [];
  currentNameMap = {};
}

function showError(msg) {
  els.doneBanner.classList.add("show", "error");
  els.doneBanner.textContent = "❌ " + msg;
  jobInProgress = false;
  releaseWakeLock();
}

function handleEvent(ev) {
  if (ev.type === "status") {
    setStatus(ev.message, { meta: currentMeta });
  } else if (ev.type === "info") {
    const meta = `Langue : ${ev.language} (${(ev.language_probability*100).toFixed(0)}%) · Durée : ${fmtTime(ev.duration)}` +
      (ev.n_speakers ? ` · ${ev.n_speakers} locuteur(s)` : "");
    setStatus("Transcription en cours…", { meta, percent: 0 });
  } else if (ev.type === "segment") {
    appendSegment(ev);
    setStatus("Transcription en cours…", { meta: currentMeta, percent: ev.progress });
  } else if (ev.type === "done") {
    finishJob(ev);
  } else if (ev.type === "error") {
    showError(ev.message);
    els.goBtn.disabled = false;
    if (currentEventSource) currentEventSource.close();
  }
}

function appendSegment(seg) {
  if (seg.index <= lastSegmentIndex) return; // dédoublonnage en cas de replay
  lastSegmentIndex = seg.index;
  segments.push({
    index: seg.index, start: seg.start, end: seg.end,
    text: seg.text, speaker: seg.speaker,
  });
  appendSegmentToDOM(seg);
  if (!isEditingText) els.transcript.scrollTop = els.transcript.scrollHeight;
}

function appendSegmentToDOM(seg) {
  const ts = fmtTime(seg.start);
  if (seg.speaker) {
    const display = speakerDisplay(seg.speaker);
    if (display !== currentSpeakerInLine) {
      const head = document.createElement("div");
      head.className = "speaker-line";
      head.textContent = display + " :";
      els.transcript.appendChild(head);
      currentSpeakerInLine = display;
    }
    els.transcript.appendChild(buildLine(seg, "text-line", ts));
  } else {
    els.transcript.appendChild(buildLine(seg, "plain-line", ts));
    currentSpeakerInLine = null;
  }
}

function buildLine(seg, className, ts) {
  const line = document.createElement("div");
  line.className = className;
  line.dataset.index = seg.index;

  const tsEl = document.createElement("span");
  tsEl.className = "ts";
  tsEl.textContent = ts;
  tsEl.title = "Cliquer pour écouter ce passage";
  tsEl.onclick = () => jumpToTimestamp(seg.start);

  const textEl = document.createElement("span");
  textEl.className = "seg-text";
  textEl.textContent = seg.text;
  textEl.contentEditable = "true";
  textEl.spellcheck = false;
  textEl.title = "Cliquer pour modifier le texte";
  attachTextEditor(textEl, seg);

  line.appendChild(tsEl);
  line.appendChild(textEl);
  line.appendChild(makeEditButton(seg));
  return line;
}

function attachTextEditor(textEl, seg) {
  textEl.addEventListener("focus", () => { isEditingText = true; });
  textEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); textEl.blur(); }
    else if (e.key === "Escape") { e.preventDefault(); textEl.textContent = seg.text; textEl.blur(); }
  });
  textEl.addEventListener("blur", async () => {
    isEditingText = false;
    const newText = textEl.textContent.trim();
    if (!newText) { textEl.textContent = seg.text; return; }
    if (newText === seg.text) return;
    try {
      const res = await fetch(`/edit/${currentJobId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index: seg.index, text: newText }),
      });
      if (!res.ok) throw new Error(`${res.status} ${await res.text().catch(() => res.statusText)}`);
      segments[seg.index - 1].text = newText;
      seg.text = newText;
    } catch (err) {
      console.error("Édition échouée :", err);
      alert("Erreur d'édition : " + err.message);
      textEl.textContent = seg.text;
    }
  });
}

function renderTranscript() {
  const prevScroll = els.transcript.scrollTop;
  els.transcript.innerHTML = "";
  currentSpeakerInLine = null;
  for (const seg of segments) appendSegmentToDOM(seg);
  els.transcript.scrollTop = prevScroll;
}

function makeEditButton(seg) {
  const btn = document.createElement("button");
  btn.className = "edit-speaker-btn";
  btn.title = "Changer le locuteur";
  btn.textContent = "✎";
  btn.onclick = (e) => { e.stopPropagation(); openSpeakerMenu(seg.index, btn); };
  return btn;
}

function openSpeakerMenu(index, anchor) {
  const seg = segments[index - 1];
  if (!seg) return;
  const select = document.createElement("select");
  select.className = "edit-speaker-select";
  let html = '<option value="">— sans locuteur —</option>';
  for (const spk of currentSpeakers) {
    const sel = spk.label === seg.speaker ? " selected" : "";
    html += `<option value="${spk.label}"${sel}>${speakerDisplay(spk.label)}</option>`;
  }
  select.innerHTML = html;
  anchor.replaceWith(select);
  select.focus();

  const closeBack = () => { if (select.parentNode) select.replaceWith(anchor); };
  let changeFired = false;

  select.addEventListener("blur", () => {
    // si change a été déclenché, on laisse le handler change gérer la fermeture
    if (!changeFired) closeBack();
  });

  select.addEventListener("change", async () => {
    changeFired = true;
    const newSpeaker = select.value || null;
    if (newSpeaker === seg.speaker) { closeBack(); return; }
    try {
      const res = await fetch(`/reassign/${currentJobId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index, speaker: newSpeaker }),
      });
      if (!res.ok) throw new Error(`${res.status} ${await res.text().catch(() => res.statusText)}`);
      segments[index - 1].speaker = newSpeaker;
      renderTranscript(); // remplace tout #transcript : le select disparaît avec
    } catch (err) {
      console.error("Réassignation échouée :", err);
      alert("Impossible de réassigner ce segment : " + err.message);
      closeBack();
    }
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function finishJob(ev) {
  if (currentEventSource) currentEventSource.close();
  setStatus("Terminé", { idle: true, percent: 100, meta: currentMeta });
  els.doneBanner.classList.add("show");
  els.doneBanner.textContent = "✿ Transcription terminée ✿";
  els.goBtn.disabled = false;
  jobInProgress = false;
  releaseWakeLock();
  localStorage.removeItem("lastJobId");

  if (ev.downloads) {
    els.dlZip.href = ev.downloads.zip;
    els.dlTxt.href = ev.downloads.txt;
    els.dlSrt.href = ev.downloads.srt;
    els.dlDocx.href = `/download/${currentJobId}/docx`;
    els.dlMd.href = `/download/${currentJobId}/md`;
    els.downloadRow.classList.add("show");
  }

  if (ev.speakers && ev.speakers.length) {
    currentSpeakers = ev.speakers;
    renderSpeakers(ev.speakers);
    renderTranscript(); // re-render pour activer les boutons d'édition speaker
  }
}

// Reprise automatique au chargement si un job est encore en cours côté serveur
window.addEventListener("load", async () => {
  const lastJobId = localStorage.getItem("lastJobId");
  if (!lastJobId) return;
  try {
    const res = await fetch(`/job/${lastJobId}`);
    if (!res.ok) { localStorage.removeItem("lastJobId"); return; }
    const info = await res.json();
    if (info.status === "running" || info.status === "pending") {
      currentJobId = lastJobId;
      setStatus(`Reprise : ${info.filename}`, { meta: `${info.n_segments} segments déjà transcrits` });
      els.goBtn.disabled = true;
      jobInProgress = true;
      setAudioSource(lastJobId);
      await acquireWakeLock();
      subscribe(lastJobId);
    } else if (info.status === "done") {
      currentJobId = lastJobId;
      setStatus("Chargement du job précédent…", { meta: info.filename });
      setAudioSource(lastJobId);
      subscribe(lastJobId);
    } else {
      localStorage.removeItem("lastJobId");
    }
  } catch (e) {
    localStorage.removeItem("lastJobId");
  }
});

function renderSpeakers(speakers) {
  els.speakersList.innerHTML = "";
  speakers.forEach(spk => {
    const row = document.createElement("div");
    row.className = "speaker-row";
    row.innerHTML = `
      <div class="label">${spk.label}</div>
      <audio controls src="${spk.sample_url}" preload="none"></audio>
      <input type="text" data-label="${spk.label}" placeholder="Nom (ex: Marc)" />
    `;
    els.speakersList.appendChild(row);
  });
  els.speakersPanel.classList.add("show");
}

els.applyBtn.addEventListener("click", async () => {
  if (!currentJobId) return;
  const map = {};
  els.speakersList.querySelectorAll("input[data-label]").forEach(inp => {
    const v = inp.value.trim();
    if (v) map[inp.dataset.label] = v;
  });
  els.applyBtn.disabled = true;
  els.applyBtn.textContent = "Application…";
  try {
    const res = await fetch(`/rename/${currentJobId}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(map),
    });
    if (!res.ok) throw new Error(res.statusText);
    currentNameMap = map;
    renderTranscript();
    els.applyBtn.textContent = "✓ Appliqué";
    setTimeout(() => { els.applyBtn.textContent = "Appliquer les noms"; els.applyBtn.disabled = false; }, 1500);
  } catch (e) {
    els.applyBtn.textContent = "Erreur";
    els.applyBtn.disabled = false;
  }
});
</script>
